name: Build and Deploy (Manual)

on:
  workflow_dispatch: # Adds the manual "Run workflow" button in GitHub UI

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install & Build
        run: |
          npm run install:all
          npm install --prefix frontend @tailwindcss/oxide-linux-x64-gnu
          npm run build

      - name: Deploy to Release Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .  
          branch: release  # Code is compiled and pushed here

      - name: Trigger Android Server Pull
        run: |
          curl -X POST "${{ secrets.DASHBOARD_URL }}/api/deployments/trigger" \
            -H "Content-Type: application/json" \
            -d '{"appName": "dashboard-api"}'